[DATABASE]
# PostgreSQL 优先；如未配置 url，可通过 VULNAGENT_DATABASE_URL 覆盖
# 示例：postgresql+psycopg://postgres:postgres@localhost:5432/vulnagent
url =
# 本地开发可临时回退到 SQLite；迁移到 DeepauditExtension 时应关闭
use_sqlite_fallback = true


[IDA_SERVICE]
service_url = http://10.12.189.21:5000

[ZERO_DAY_AGENT]
# DeepauditExtension 集成的 zero-day 路径分析服务地址
service_url = http://localhost:8000/api/v1/zero-day-agent
# 请求超时时间（秒）
# 注意：路径分析流程包含 vulfunc_rank + 路径分析 + LLM，
#       实测 net-cgi（28个碰撞函数）需要约 3~4 小时，proftpd 约 10 分钟。
#       建议设置为 14400（4小时）以覆盖最慢的情况。
timeout = 14400
